name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build all packages and CDN bundles
        run: pnpm build:all

      - name: Verify CDN artifacts
        run: |
          test -f packages/vanilla/dist/verino.min.js
          test -f packages/alpine/dist/verino-alpine.min.js
          test -f packages/web-component/dist/verino-wc.min.js

      - name: Create release PR or publish to npm registry
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
